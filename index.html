<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Portal Workspace</title>
    
    <!-- Tailwind CSS untuk styling super cepat & modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons untuk icon menu -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* Mencegah scroll di halaman utama agar iframe bisa full */
        body { margin: 0; overflow: hidden; background-color: #0f172a; }
        
        /* Styling transisi mulus untuk menu popup */
        .menu-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="w-screen h-screen relative">

    <!-- IFRAME: Tempat Aplikasi Ditampilkan -->
    <!-- src default diarahkan ke psp-bot/index.html -->
    <iframe 
        id="app-frame" 
        src="psp-bot/index.html" 
        class="w-full h-full border-none bg-white">
    </iframe>

    <!-- FLOATING UI KONTROLER -->
    <div class="fixed bottom-6 right-6 z-[9999] flex flex-col items-end">
        
        <!-- Dropdown Menu (Popup ke atas) -->
        <div id="app-menu" class="hidden menu-transition origin-bottom-right scale-95 opacity-0 translate-y-4 mb-4 bg-white/80 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-white/40 p-3 w-64">
            
            <div class="px-3 py-2 mb-1 border-b border-slate-200/60">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Pilih Aplikasi</h3>
            </div>
            
            <div class="space-y-1 mt-2">
                <!-- Tombol App 1 -->
                <button onclick="loadApp('psp-bot')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-blue-50 text-slate-700 hover:text-blue-700 font-semibold flex items-center gap-3 transition-colors group">
                    <div class="p-1.5 bg-blue-100 text-blue-600 rounded-lg group-hover:scale-110 transition-transform">
                        <i class="ph-fill ph-robot text-lg"></i>
                    </div>
                    PSP Auto Top Up
                </button>

                <!-- Tombol App 2 -->
                <button onclick="loadApp('dashboard-smartcard')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-emerald-50 text-slate-700 hover:text-emerald-700 font-semibold flex items-center gap-3 transition-colors group">
                    <div class="p-1.5 bg-emerald-100 text-emerald-600 rounded-lg group-hover:scale-110 transition-transform">
                        <i class="ph-fill ph-chart-line-up text-lg"></i>
                    </div>
                    Dashboard Smartcard
                </button>

                <!-- Tombol App 3 -->
                <button onclick="loadApp('kalkulator-saldo')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 text-slate-700 hover:text-indigo-700 font-semibold flex items-center gap-3 transition-colors group">
                    <div class="p-1.5 bg-indigo-100 text-indigo-600 rounded-lg group-hover:scale-110 transition-transform">
                        <i class="ph-fill ph-calculator text-lg"></i>
                    </div>
                    Kalkulator Saldo
                </button>

                <!-- Tombol App 4 -->
                <button onclick="loadApp('cetak-slip')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-purple-50 text-slate-700 hover:text-purple-700 font-semibold flex items-center gap-3 transition-colors group">
                    <div class="p-1.5 bg-purple-100 text-purple-600 rounded-lg group-hover:scale-110 transition-transform">
                        <i class="ph-fill ph-printer text-lg"></i>
                    </div>
                    Cetak Slip VA
                </button>
            </div>
        </div>

        <!-- Tombol Floating Utama (FAB) -->
        <button id="menu-toggle" class="w-14 h-14 bg-slate-900 text-white rounded-full shadow-[0_8px_20px_rgb(0,0,0,0.3)] hover:shadow-[0_8px_25px_rgb(0,0,0,0.4)] hover:-translate-y-1 transition-all duration-300 flex items-center justify-center focus:outline-none ring-4 ring-transparent hover:ring-slate-900/20 group">
            <i id="toggle-icon" class="ph ph-squares-four text-2xl transition-transform duration-300 group-hover:rotate-90"></i>
        </button>

    </div>

    <!-- Script Logika UI -->
    <script>
        const menu = document.getElementById('app-menu');
        const toggleBtn = document.getElementById('menu-toggle');
        const toggleIcon = document.getElementById('toggle-icon');
        const appFrame = document.getElementById('app-frame');

        // Fungsi Buka/Tutup Menu
        function toggleMenu() {
            const isHidden = menu.classList.contains('hidden');
            
            if (isHidden) {
                // Tampilkan Menu
                menu.classList.remove('hidden');
                // Beri sedikit jeda agar animasi CSS terbaca browser
                setTimeout(() => {
                    menu.classList.remove('scale-95', 'opacity-0', 'translate-y-4');
                    menu.classList.add('scale-100', 'opacity-100', 'translate-y-0');
                }, 10);
                
                // Ubah icon jadi X
                toggleIcon.classList.remove('ph-squares-four', 'group-hover:rotate-90');
                toggleIcon.classList.add('ph-x', 'rotate-90');
            } else {
                // Sembunyikan Menu
                menu.classList.remove('scale-100', 'opacity-100', 'translate-y-0');
                menu.classList.add('scale-95', 'opacity-0', 'translate-y-4');
                
                // Tunggu animasi selesai baru hidden
                setTimeout(() => {
                    menu.classList.add('hidden');
                }, 300);
                
                // Kembalikan icon
                toggleIcon.classList.add('ph-squares-four', 'group-hover:rotate-90');
                toggleIcon.classList.remove('ph-x', 'rotate-90');
            }
        }

        // Listener untuk tombol FAB
        toggleBtn.addEventListener('click', toggleMenu);

        // Fungsi Mengganti Aplikasi di Iframe
        function loadApp(folderName) {
            // Ganti source iframe
            appFrame.src = folderName + '/index.html';
            
            // Tutup menu setelah diklik
            toggleMenu();
        }

        // Opsional: Tutup menu jika klik area luar (menggunakan trik overlay iframe)
        // Karena iframe memblokir event klik ke parent, kita asumsikan jika iframe di-hover, user sedang pakai app
        appFrame.addEventListener('mouseenter', () => {
            if (!menu.classList.contains('hidden')) {
                toggleMenu();
            }
        });
    </script>
</body>
</html>
