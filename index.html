<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penitipan App</title>
    
    <!-- Menambahkan Google Font 'Montserrat' agar font serasi dengan text di logo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS untuk styling super cepat & modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons untuk icon -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* Mencegah scroll di body utama, scroll hanya diizinkan di dalam home-view jika layar kecil */
        body { margin: 0; overflow: hidden; background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        
        /* Styling transisi mulus untuk menu popup */
        .menu-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animasi masuk untuk kartu aplikasi */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="w-screen h-screen relative text-slate-800">

    <!-- ========================================== -->
    <!-- 1. HALAMAN BERANDA (HOME DASHBOARD)        -->
    <!-- ========================================== -->
    <div id="home-view" class="absolute inset-0 z-10 overflow-y-auto bg-slate-50 flex flex-col items-center py-12 px-4 transition-opacity duration-300">
        
        <!-- Header: Logo di kiri, Judul di kanan -->
        <div class="flex items-center justify-center gap-4 md:gap-6 max-w-2xl mx-auto mb-12 animate-fade-up" style="animation-delay: 0.1s;">
            <div class="inline-flex items-center justify-center p-1.5 bg-white rounded-2xl shadow-sm border border-slate-200 shrink-0">
                <!-- Memanggil gambar logo. Pastikan nama file gambarnya adalah logo.jpg -->
                <img src="logo.jpg" alt="Logo Wali Barokah" class="w-16 h-16 md:w-20 md:h-20 object-contain rounded-xl">
            </div>
            
            <!-- Font diubah menjadi Montserrat dengan warna hijau logo (#188544) -->
            <h1 class="text-2xl sm:text-3xl md:text-4xl tracking-tight text-[#188544] leading-tight m-0" style="font-family: 'Montserrat', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em;">
                Penitipan App
            </h1>
        </div>

        <!-- Grid Aplikasi (Kartu Dibuat Lebih Simpel) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 max-w-3xl w-full">
            
            <!-- Card App 1: PSP Bot -->
            <div onclick="loadApp('psp-bot')" class="group bg-white rounded-2xl p-4 md:p-5 shadow-sm hover:shadow-xl border border-slate-200/60 hover:border-blue-300 cursor-pointer transition-all duration-300 hover:-translate-y-1 animate-fade-up opacity-0" style="animation-delay: 0.2s;">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center group-hover:scale-110 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300 shadow-inner shrink-0">
                        <i class="ph-fill ph-robot text-2xl"></i>
                    </div>
                    <h3 class="text-base md:text-lg font-bold text-slate-800 group-hover:text-blue-700 transition-colors m-0">PSP Auto Top Up</h3>
                </div>
            </div>

            <!-- Card App 2: Dashboard Smartcard -->
            <div onclick="loadApp('dashboard-smartcard')" class="group bg-white rounded-2xl p-4 md:p-5 shadow-sm hover:shadow-xl border border-slate-200/60 hover:border-emerald-300 cursor-pointer transition-all duration-300 hover:-translate-y-1 animate-fade-up opacity-0" style="animation-delay: 0.3s;">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center group-hover:scale-110 group-hover:bg-emerald-600 group-hover:text-white transition-all duration-300 shadow-inner shrink-0">
                        <i class="ph-fill ph-chart-line-up text-2xl"></i>
                    </div>
                    <h3 class="text-base md:text-lg font-bold text-slate-800 group-hover:text-emerald-700 transition-colors m-0">Dashboard Smartcard</h3>
                </div>
            </div>

            <!-- Card App 3: Kalkulator Saldo -->
            <div onclick="loadApp('kalkulator-saldo')" class="group bg-white rounded-2xl p-4 md:p-5 shadow-sm hover:shadow-xl border border-slate-200/60 hover:border-indigo-300 cursor-pointer transition-all duration-300 hover:-translate-y-1 animate-fade-up opacity-0" style="animation-delay: 0.4s;">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center group-hover:scale-110 group-hover:bg-indigo-600 group-hover:text-white transition-all duration-300 shadow-inner shrink-0">
                        <i class="ph-fill ph-calculator text-2xl"></i>
                    </div>
                    <h3 class="text-base md:text-lg font-bold text-slate-800 group-hover:text-indigo-700 transition-colors m-0">Kalkulator Saldo</h3>
                </div>
            </div>

            <!-- Card App 4: Cetak Slip VA -->
            <div onclick="loadApp('cetak-slip')" class="group bg-white rounded-2xl p-4 md:p-5 shadow-sm hover:shadow-xl border border-slate-200/60 hover:border-purple-300 cursor-pointer transition-all duration-300 hover:-translate-y-1 animate-fade-up opacity-0" style="animation-delay: 0.5s;">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center group-hover:scale-110 group-hover:bg-purple-600 group-hover:text-white transition-all duration-300 shadow-inner shrink-0">
                        <i class="ph-fill ph-printer text-2xl"></i>
                    </div>
                    <h3 class="text-base md:text-lg font-bold text-slate-800 group-hover:text-purple-700 transition-colors m-0">Cetak Slip VA</h3>
                </div>
            </div>

        </div>
        
        <div class="mt-16 text-slate-400 text-xs font-medium animate-fade-up opacity-0" style="animation-delay: 0.6s;">
            &copy; 2024 Penitipan App. All systems operational.
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 2. IFRAME: Tempat Aplikasi Ditampilkan     -->
    <!-- ========================================== -->
    <!-- Dibuat tersembunyi (hidden) saat pertama kali dimuat -->
    <iframe 
        id="app-frame" 
        src="" 
        class="absolute inset-0 z-0 w-full h-full border-none bg-white hidden">
    </iframe>

    <!-- ========================================== -->
    <!-- 3. FLOATING UI KONTROLER                   -->
    <!-- ========================================== -->
    <div class="fixed bottom-6 right-6 z-[9999] flex flex-col items-end">
        
        <!-- Dropdown Menu (Popup ke atas) -->
        <div id="app-menu" class="hidden menu-transition origin-bottom-right scale-95 opacity-0 translate-y-4 mb-4 bg-white/90 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-slate-200/80 p-3 w-64">
            
            <!-- Premium Header Design -->
            <div class="px-4 py-3 mb-2 relative">
                <!-- Decorative subtle underline gradient -->
                <div class="absolute bottom-0 left-4 right-4 h-[1px] bg-gradient-to-r from-emerald-500/40 via-slate-200 to-transparent"></div>
                <h3 class="flex items-center gap-2.5 text-[10px] font-black uppercase tracking-[0.25em]">
                    <!-- Pulsing indicator dot -->
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <!-- Gradient Text -->
                    <span class="bg-gradient-to-r from-slate-700 to-slate-400 bg-clip-text text-transparent">Navigasi</span>
                </h3>
            </div>
            
            <div class="space-y-1 mt-2">
                <!-- Tombol Kembali ke Beranda -->
                <button onclick="goHome()" class="w-full text-left px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-700 hover:text-slate-900 font-bold flex items-center gap-3 transition-colors group border border-transparent hover:border-slate-200 mb-2">
                    <div class="p-1.5 bg-slate-200 text-slate-700 rounded-lg group-hover:scale-110 transition-transform">
                        <i class="ph-fill ph-house text-lg"></i>
                    </div>
                    Beranda Utama
                </button>

                <div class="h-px bg-slate-100 my-2"></div>

                <!-- Tombol App 1 -->
                <button onclick="loadApp('psp-bot')" class="w-full text-left px-4 py-2.5 rounded-xl hover:bg-blue-50 text-slate-600 hover:text-blue-700 font-semibold flex items-center gap-3 transition-colors group text-sm">
                    <div class="text-blue-500 group-hover:scale-125 transition-transform"><i class="ph-fill ph-robot text-lg"></i></div>
                    PSP Auto Top Up
                </button>

                <!-- Tombol App 2 -->
                <button onclick="loadApp('dashboard-smartcard')" class="w-full text-left px-4 py-2.5 rounded-xl hover:bg-emerald-50 text-slate-600 hover:text-emerald-700 font-semibold flex items-center gap-3 transition-colors group text-sm">
                    <div class="text-emerald-500 group-hover:scale-125 transition-transform"><i class="ph-fill ph-chart-line-up text-lg"></i></div>
                    Dashboard Smartcard
                </button>

                <!-- Tombol App 3 -->
                <button onclick="loadApp('kalkulator-saldo')" class="w-full text-left px-4 py-2.5 rounded-xl hover:bg-indigo-50 text-slate-600 hover:text-indigo-700 font-semibold flex items-center gap-3 transition-colors group text-sm">
                    <div class="text-indigo-500 group-hover:scale-125 transition-transform"><i class="ph-fill ph-calculator text-lg"></i></div>
                    Kalkulator Saldo
                </button>

                <!-- Tombol App 4 -->
                <button onclick="loadApp('cetak-slip')" class="w-full text-left px-4 py-2.5 rounded-xl hover:bg-purple-50 text-slate-600 hover:text-purple-700 font-semibold flex items-center gap-3 transition-colors group text-sm">
                    <div class="text-purple-500 group-hover:scale-125 transition-transform"><i class="ph-fill ph-printer text-lg"></i></div>
                    Cetak Slip VA
                </button>
            </div>
        </div>

        <!-- Tombol Floating Utama (FAB) -->
        <button id="menu-toggle" class="w-14 h-14 bg-slate-900 text-white rounded-full shadow-[0_8px_20px_rgb(0,0,0,0.3)] hover:shadow-[0_8px_25px_rgb(0,0,0,0.4)] hover:-translate-y-1 transition-all duration-300 flex items-center justify-center focus:outline-none ring-4 ring-transparent hover:ring-slate-900/20 group">
            <i id="toggle-icon" class="ph ph-squares-four text-2xl transition-transform duration-300 group-hover:rotate-90"></i>
        </button>

    </div>

    <!-- Script Logika UI -->
    <script>
        const menu = document.getElementById('app-menu');
        const toggleBtn = document.getElementById('menu-toggle');
        const toggleIcon = document.getElementById('toggle-icon');
        const appFrame = document.getElementById('app-frame');
        const homeView = document.getElementById('home-view');

        // Fungsi Buka/Tutup Menu Melayang
        function toggleMenu() {
            const isHidden = menu.classList.contains('hidden');
            
            if (isHidden) {
                // Tampilkan Menu
                menu.classList.remove('hidden');
                setTimeout(() => {
                    menu.classList.remove('scale-95', 'opacity-0', 'translate-y-4');
                    menu.classList.add('scale-100', 'opacity-100', 'translate-y-0');
                }, 10);
                
                // Ubah icon jadi X
                toggleIcon.classList.remove('ph-squares-four', 'group-hover:rotate-90');
                toggleIcon.classList.add('ph-x', 'rotate-90');
            } else {
                // Sembunyikan Menu
                menu.classList.remove('scale-100', 'opacity-100', 'translate-y-0');
                menu.classList.add('scale-95', 'opacity-0', 'translate-y-4');
                
                setTimeout(() => {
                    menu.classList.add('hidden');
                }, 300);
                
                // Kembalikan icon
                toggleIcon.classList.add('ph-squares-four', 'group-hover:rotate-90');
                toggleIcon.classList.remove('ph-x', 'rotate-90');
            }
        }

        toggleBtn.addEventListener('click', toggleMenu);

        // Fungsi Membuka Aplikasi
        function loadApp(folderName) {
            // Sembunyikan Home View
            homeView.classList.add('opacity-0');
            setTimeout(() => {
                homeView.classList.add('hidden');
                homeView.classList.remove('z-10');
            }, 300);

            // Tampilkan dan Set Iframe
            appFrame.classList.remove('hidden');
            appFrame.classList.add('z-10');
            appFrame.src = folderName + '/index.html';
            
            // Tutup menu jika sedang terbuka
            if (!menu.classList.contains('hidden')) {
                toggleMenu();
            }
        }

        // Fungsi Kembali ke Beranda
        function goHome() {
            // Sembunyikan Iframe
            appFrame.classList.remove('z-10');
            appFrame.classList.add('hidden');
            
            // Tampilkan kembali Home View
            homeView.classList.remove('hidden');
            homeView.classList.add('z-10');
            setTimeout(() => {
                homeView.classList.remove('opacity-0');
            }, 10);

            // Tutup menu jika sedang terbuka
            if (!menu.classList.contains('hidden')) {
                toggleMenu();
            }
        }

        // Tutup menu melayang saat area Iframe (aplikasi) disentuh
        appFrame.addEventListener('mouseenter', () => {
            if (!menu.classList.contains('hidden')) {
                toggleMenu();
            }
        });
    </script>
</body>
</html>
